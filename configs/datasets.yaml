datasets:
  # ── SUIM TEST split ──────────────────────────────────────────────────────────
  # 110 images, per-class binary BMP masks — full quantitative evaluation
  # Download: https://drive.google.com/file/d/1uEnlqKrlt6lITc_i80NTtb7iHGcO47sU
  suim:
    images_rel: suim/TEST/images
    labels_rel: suim/TEST/masks
    has_labels: true

  # ── DeepFish ─────────────────────────────────────────────────────────────────
  # ~40k fish images; fish-only binary masks (FV class only)
  # Run convert_deepfish.py first to produce SUIM-format masks under masks/FV/
  # Download: http://data.qld.edu.au/public/Q5842/.../DeepFish.tar
  deepfish:
    images_rel: deepfish/images
    labels_rel: deepfish/masks        # populated after running convert_deepfish.py
    has_labels: true

  # ── USIS10K TEST split ───────────────────────────────────────────────────────
  # ~1595 test images, COCO JSON annotations (7 classes)
  # Run convert_usis10k.py first to produce SUIM-format binary masks
  # Download: https://drive.google.com/file/d/1LdjLPaieWA4m8vLV6hEeMvt5wHnLg9gV
  usis10k:
    images_rel: usis10k/test
    labels_rel: usis10k/masks         # populated after running convert_usis10k.py
    has_labels: true
