# SPADE depth-estimation benchmark datasets.
# Used by src/spade/run_eval.py and cluster/spade_metrics.sbat.
#
# filenames_file_eval : path to the filenames list.
#   Generated by convert_*.py scripts, written to data/spade_lists/.
#   data/spade_lists/ is gitignored (machine-specific absolute paths).
#   Leave empty for the flsea_demo default (uses bundled vendor data).
#
# data_path_eval / gt_path_eval : set to "/" when filenames_file contains
#   absolute paths.  The data loader strips the leading "/" from each path,
#   then joins with this root — yielding the original absolute path.
#   Leave as "" for paths that are relative to vendor/SPADE/ (e.g. flsea_demo).
#
# eval_ranges : depth thresholds in metres — metrics reported per range.

datasets:

  # --- 15-image FLSea demo bundled with vendor/SPADE (no download needed) ---
  flsea_demo:
    filenames_file_eval: "./DataLists/flease_testing/flsea_demo.txt"
    data_path_eval: ""
    gt_path_eval:   ""
    min_depth: 0.1
    max_depth: 18.0
    eval_ranges: [10, 5, 2]

  # --- SeaThru (Akkaynak & Treibitz, CVPR 2019) ------------------------------
  # Source  : https://www.kaggle.com/datasets/colorlabeilat/seathru-dataset
  # Download: bash scripts/download_spade_data.sh
  # Convert : sbatch --export=DATASET=seathru cluster/spade_convert.sbat
  #   → writes data/spade_lists/seathru_test.txt  (absolute paths)
  seathru:
    filenames_file_eval: ""     # filled by convert_seathru.py at runtime
    data_path_eval: "/"         # allows absolute paths in filenames file
    gt_path_eval:   "/"
    min_depth: 0.1
    max_depth: 18.0
    eval_ranges: [10, 5, 2]

  # --- FLSea-VI (Randall & Treibitz 2023, HuggingFace mirror) ----------------
  # Source  : https://huggingface.co/datasets/bhowmikabhimanyu/flsea-vi
  # Download: bash scripts/download_spade_data.sh   (validation split ~13 GB)
  # Convert : sbatch --export=DATASET=flsea cluster/spade_convert.sbat
  #   → writes data/spade_lists/flsea_test.txt  (absolute paths)
  flsea:
    filenames_file_eval: ""     # filled by convert_flsea.py at runtime
    data_path_eval: "/"
    gt_path_eval:   "/"
    min_depth: 0.1
    max_depth: 18.0
    eval_ranges: [10, 5, 2]
